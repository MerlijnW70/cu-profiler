version: 2
updates:
  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      cargo-minor-and-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    ignore:
      # `dtolnay/rust-toolchain` is referenced by intentional pins (@stable and
      # @1.85.0 for the MSRV job), not a version to track. Bumping it would
      # defeat the MSRV check.
      - dependency-name: "dtolnay/rust-toolchain"
