name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  test:
    name: build · test · clippy · fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Build
        run: cargo build --workspace --all-features

      - name: Test
        run: cargo test --workspace --all-features

  msrv:
    name: minimum supported Rust (1.85)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@1.85.0
      - uses: Swatinem/rust-cache@v2
      - name: Build (default features)
        run: cargo build --workspace

  program-test:
    name: program-test backend (Solana, Linux only)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build & test live backend
        working-directory: integration/cu-profiler-program-test
        run: cargo test --locked --verbose

  mollusk:
    name: mollusk backend (Solana SBF, Linux only)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install Solana SBF toolchain (cargo build-sbf)
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/stable/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> "$GITHUB_PATH"

      - name: Build the SBF demo program
        working-directory: integration/cu-profiler-mollusk/program
        env:
          RUSTFLAGS: ""
        run: cargo build-sbf

      - name: Test the mollusk backend (real CU metering)
        working-directory: integration/cu-profiler-mollusk
        env:
          SBF_OUT_DIR: ${{ github.workspace }}/integration/cu-profiler-mollusk/program/target/deploy
        run: cargo test --verbose
