name: Publish to crates.io

# Publishes the workspace crates to crates.io in dependency order when a GitHub
# release is published. Requires a `CRATES_IO_TOKEN` repository secret
# (Settings → Secrets and variables → Actions). Until that secret exists the job
# fails fast with a clear message — nothing is published by accident.
#
# Publishing is irreversible (a version can be yanked but never deleted), so this
# only ever runs on an explicit release or manual dispatch.

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    name: cargo publish (core → instrumentation → report → cli)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Verify token is configured
        run: |
          if [ -z "${{ secrets.CRATES_IO_TOKEN }}" ]; then
            echo "::error::CRATES_IO_TOKEN secret is not set — add it in repo settings before publishing."
            exit 1
          fi

      - name: Publish crates in dependency order
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
        run: |
          set -euo pipefail
          publish() {
            echo "::group::publishing $1"
            cargo publish -p "$1"
            echo "::endgroup::"
            # Give crates.io a moment to index the new version before the next
            # crate (which depends on it) is published.
            sleep 30
          }
          publish cu-profiler-core
          publish cu-profiler-instrumentation
          publish cu-profiler-report
          publish cu-profiler-cli
